<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 PWA</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4a90d9">
</head>
<body>
  <h1>我的收藏</h1>

  <form id="collection-form">
    <input type="text" id="item-name" placeholder="名稱" required>
    <textarea id="item-desc" placeholder="描述" rows="2"></textarea>
    <input type="url" id="item-photo" placeholder="照片網址 (選填)">
    <button type="submit">新增收藏</button>
  </form>
<script>
  const form = document.getElementById('collection-form');

  form.addEventListener('submit', (e) => {
    e.preventDefault();

    const name = document.getElementById('item-name').value.trim();
    const desc = document.getElementById('item-desc').value.trim();
    const photo = document.getElementById('item-photo').value.trim();

    const item = {
      id: Date.now(),
      name,
      desc,
      photo
    };

    const items = JSON.parse(localStorage.getItem('myCollection') || '[]');
    items.push(item);
    localStorage.setItem('myCollection', JSON.stringify(items));

    alert('收藏成功！');
    form.reset();
  });
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('Service Worker 註冊成功', reg))
          .catch((err) => console.log('Service Worker 註冊失敗', err));
      });
    }
  </script>
</body>
</html>
