<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 PWA</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4a90d9">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
    background: #f5f5f5;
    color: #333;
  }

  h1 {
    color: #4a90d9;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
    padding: 16px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  input, textarea {
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  button {
    padding: 10px;
    border: none;
    border-radius: 4px;
    background: #4a90d9;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }

  button:hover {
    background: #3a7bc8;
  }
.item img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .item {
    padding: 12px;
    background: #fff;
    border-radius: 8px;
    margin-bottom: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .item h3 {
    margin: 0 0 4px 0;
  }

  .item p {
    margin: 0 0 8px 0;
    color: #666;
    font-size: 14px;
  }

  .item button {
    background: #e74c3c;
    padding: 6px 12px;
    font-size: 12px;
  }

  .item button:hover {
    background: #c0392b;
  }
  .category {
    display: inline-block;
    padding: 2px 8px;
    background: #4a90d9;
    color: #fff;
    border-radius: 12px;
    font-size: 12px;
    margin-bottom: 6px;
  }
</style>
</head>
<body>
  <h1>我的收藏</h1>
<div id="collection-list"></div>
  <form id="collection-form">
    <input type="text" id="item-name" placeholder="名稱" required>
    <select id="item-category">
  <option value="">選擇分類</option>
  <option value="酒">酒</option>
  <option value="普洱茶">普洱茶</option>
  <option value="壺">壺</option>
  <option value="石頭">石頭</option>
  <option value="其他">其他</option>
</select>
    <textarea id="item-desc" placeholder="描述" rows="2"></textarea>
    <input type="file" id="item-photo" accept="image/*">
    <button type="submit">新增收藏</button>
  </form>
<script>
  const form = document.getElementById('collection-form');

  form.addEventListener('submit', (e) => {
    e.preventDefault();

    const name = document.getElementById('item-name').value.trim();
    const desc = document.getElementById('item-desc').value.trim();
    const photo = document.getElementById('item-photo').value.trim();
    const category = document.getElementById('item-category').value;

    const item = {
      id: Date.now(),
      name,
      category,
      desc,
      photo
    };

    const items = JSON.parse(localStorage.getItem('myCollection') || '[]');
    items.push(item);
    localStorage.setItem('myCollection', JSON.stringify(items));

    alert('收藏成功！');
    form.reset();
    renderItems();
    });
    function renderItems() {
  const list = document.getElementById('collection-list');
  const items = JSON.parse(localStorage.getItem('myCollection') || '[]');

  list.innerHTML = '';

  if (items.length === 0) {
    list.innerHTML = '<p>還沒有收藏項目！</p>';
    return;
  }

  items.forEach((item) => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
     ${item.photo ? `<img src="${item.photo}" alt="${item.name}">` : ''}
      <h3>${item.name}</h3>
      ${item.category ? `<span class="category">${item.category}</span>` : ''}
      <p>${item.desc}</p>
      <button onclick="deleteItem(${item.id})">刪除</button>
    `;
    list.appendChild(div);
  });
}

renderItems();
  function deleteItem(id) {
  const items = JSON.parse(localStorage.getItem('myCollection') || '[]');
  const updated = items.filter((item) => item.id !== id);
  localStorage.setItem('myCollection', JSON.stringify(updated));
  renderItems();
}
</script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('Service Worker 註冊成功', reg))
          .catch((err) => console.log('Service Worker 註冊失敗', err));
      });
    }
  </script>
</body>
</html>
